version: "3.9"

services:
  # --- App + LangGraph checkpointer ---------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: rag_postgres
    environment:
      POSTGRES_USER: retail
      POSTGRES_PASSWORD: retail_password
      POSTGRES_DB: retail_db
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U retail -d retail_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  # --- Vector store -------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:v1.10.0
    container_name: rag_qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 5s
      timeout: 5s
      retries: 10

  # --- Langfuse observability stack --------------------------------------
  # Langfuse uses its own Postgres database (separate from the app database)
  # so observability schema lives independently of retail_db.
  langfuse-db:
    image: postgres:16-alpine
    container_name: langfuse_db
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse_password
      POSTGRES_DB: langfuse
    volumes:
      - langfuse_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse -d langfuse"]
      interval: 5s
      timeout: 5s
      retries: 10

  langfuse:
    image: langfuse/langfuse:3
    container_name: langfuse
    depends_on:
      langfuse-db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://langfuse:langfuse_password@langfuse-db:5432/langfuse
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET:-please-change-me}
      LANGFUSE_INIT_USER_EMAIL: ${LANGFUSE_USER_EMAIL:-admin@example.com}
      LANGFUSE_INIT_USER_PASSWORD: ${LANGFUSE_USER_PASSWORD:-admin_password}
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/public/health"]
      interval: 10s
      timeout: 5s
      retries: 15

  # --- FastAPI backend ----------------------------------------------------
  backend:
    build: .
    container_name: rag_backend
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      langfuse:
        condition: service_healthy
    environment:
      APP_ENV: development
      LOG_LEVEL: INFO
      # Alibaba (sole LLM + embedding + rerank provider)
      ALIBABA_API_KEY: ${ALIBABA_API_KEY:-}
      ALIBABA_URL: ${ALIBABA_URL:-https://ws-v9y2oinbtzzm4ey9.ap-southeast-1.maas.aliyuncs.com/compatible-mode/v1}
      ALIBABA_LLM_MODEL: ${ALIBABA_LLM_MODEL:-qwen-mt-flash}
      ALIBABA_RERANK_URL: ${ALIBABA_RERANK_URL:-https://dashscope-intl.aliyuncs.com/api/v1/services/rerank/text-rerank/text-rerank}
      # Embedding
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-alibaba}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-v3}
      EMBEDDING_DIM: ${EMBEDDING_DIM:-1024}
      # Rerank
      RERANK_PROVIDER: ${RERANK_PROVIDER:-alibaba}
      RERANK_MODEL: ${RERANK_MODEL:-gte-rerank}
      RERANK_TOP_N: ${RERANK_TOP_N:-20}
      # Hybrid weights
      HYBRID_SPARSE_WEIGHT: ${HYBRID_SPARSE_WEIGHT:-0.4}
      HYBRID_DENSE_WEIGHT: ${HYBRID_DENSE_WEIGHT:-0.6}
      HYBRID_TOP_N: ${HYBRID_TOP_N:-20}
      RERANK_FINAL_K: ${RERANK_FINAL_K:-5}
      # Database + Qdrant
      DATABASE_URL: postgresql+psycopg2://retail:retail_password@postgres:5432/retail_db
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: policy_docs
      # Langfuse
      LANGFUSE_ENABLED: ${LANGFUSE_ENABLED:-true}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_HOST: http://langfuse:3000
      # Checkpointer
      CHECKPOINT_BACKEND: ${CHECKPOINT_BACKEND:-memory}
      # Guardrails
      ENABLE_INPUT_GUARDRAIL: "true"
      ENABLE_OUTPUT_GUARDRAIL: "true"
      ENABLE_PII_REDACTION: "true"
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./scripts:/app/scripts
      - ./app:/app/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  # --- Streamlit chat UI --------------------------------------------------
  streamlit:
    build: ./ui
    container_name: rag_streamlit
    depends_on:
      backend:
        condition: service_healthy
    environment:
      BACKEND_URL: http://backend:8000
    ports:
      - "8501:8501"

volumes:
  pg_data:
  qdrant_data:
  langfuse_pg:
